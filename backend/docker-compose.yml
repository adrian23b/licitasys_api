services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: seace
      POSTGRES_USER: seace
      POSTGRES_PASSWORD: seace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seace -d seace"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://seace:seace@postgres:5432/seace
      SEACE_BASE_URL: https://prod4.seace.gob.pe:8086
      CRAWLER_INTERVAL: 3600
      CRAWLER_KEYWORDS: software,cloud,firewall,ciberseguridad
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
